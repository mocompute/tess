name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: macos-latest
            compiler: clang
          - os: windows-latest
            compiler: msvc
            continue-on-error: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue-on-error || false }}

    steps:
      - uses: actions/checkout@v4

      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        run: make -j CC=${{ matrix.compiler }}

      - name: Test (Unix)
        if: matrix.os != 'windows-latest'
        run: make -j test

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -B build
          cmake --build build

      - name: Test (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd build
          ctest --output-on-failure
